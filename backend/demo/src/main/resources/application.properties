spring.application.name=demo

# Server configuration
server.port=8080

# DATABASE CONFIGURATION FOR MULTI-TENANT PLATFORM
spring.datasource.url=jdbc:mysql://localhost:3306/smart_garden_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable logging for MQTT and WebSocket debugging
logging.level.com.example.demo.service=DEBUG
logging.level.org.springframework.web.socket=DEBUG
